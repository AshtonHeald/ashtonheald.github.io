<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Start Page | Tools</title>
	<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
	<link rel="stylesheet" href="styles/css/main.css">
</head>

<body>
	<nav id="sidebar">
		<div id="navHeader">
			<div id="logo">
				<a class="mobile" href="">S.A.D</a>
			</div>
			<div id="menuBtnContainer">
				<span id="menuBtn" title="Icon-only"><i class="fa-duotone fa-bars"></i></span>
			</div>
		</div>
		<ul id="navMenu">
			<li class="nav-item">
				<a href="index.html" class="btn-group active" aria-current="page" data-bs-title="Home" data-bs-toggle="tooltip"
					data-bs-placement="right">
					<span><i class="fa-duotone fa-house"></i></span>
					<span>Home</span>
				</a>
			</li>
			<li>
				<a href="news.html" class="">
					<span><i class="fa-duotone fa-newspaper"></i></span>
					<span>News</span>
				</a>
			</li>
			<li>
				<a href="tools.html" class="active">
					<span><i class="fa-duotone fa-screwdriver-wrench"></i></span>
					<span>Tools</span>
				</a>
			</li>
			<li>
				<a href="games.html" class="">
					<span><i class="fa-duotone fa-gamepad-modern"></i></span>
					<span>Games</span>
				</a>
			</li>
		</ul>
		<div id="themeContainer">
			<form id="themeSwitch">
				<div id="themeBtn">
					<i class="fa-duotone fa-circle-half-stroke"></i>
				</div>
				<div>
					<input checked type="radio" id="auto" name="theme" value="auto">
					<label for="auto">Auto</label>
				</div>
				<div>
					<input type="radio" id="light" name="theme" value="light">
					<label for="light">Anime</label>
				</div>
				<div>
					<input type="radio" id="dark" name="theme" value="dark">
					<label for="dark">Cyberpunk</label>
				</div>
			</form>
		</div>
	</nav>
	<div id="container">
		<section id="main">
			<div class="container">
				<div class="card-container">
					<a href="https://start.ashthe.dev/simple-calculator" class="card">
						<h3>Calculator</h3>
					</a>
					<a href="" class="card">
						<h3>Lorem</h3>
					</a>
					<a href="" class="card">
						<h3>Ipsum</h3>
					</a>
				</div>
			</div>
		</section>
		<footer>
			<div>Built by <a href="">Ashton Heald</a></div>
		</footer>
	</div>

</body>
<script src="scripts/scripts.js"></script>

</html>
