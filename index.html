<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ashton Heald | Code Playground</title>
	<link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
	<link rel="stylesheet" href="styles/css/main.css">
</head>

<body>
	<!-- ===============
	  Start Navigation
	================ -->
	<nav id="sidebar">
		<div id="navHeader">
			<div id="logo">
				<a class="mobile" href="">S.A.D</a>
			</div>
			<div id="menuBtnContainer">
				<span id="menuBtn" title="Icon-only"><i class="fa-duotone fa-bars"></i></span>
			</div>
		</div>
		<ul id="navMenu">
			<li class="nav-item">
				<a href="index.html" class="active" aria-current="page" data-bs-title="Home" data-bs-toggle="tooltip"
					data-bs-placement="right">
					<span><i class="fa-duotone fa-house"></i></span>
					<span>Home</span>
				</a>
			</li>
			<li>
				<a href="news.html" class="">
					<span><i class="fa-duotone fa-newspaper"></i></span>
					<span>News</span>
				</a>
			</li>
			<li>
				<a href="tools.html" class="">
					<span><i class="fa-duotone fa-screwdriver-wrench"></i></span>
					<span>Tools</span>
				</a>
			</li>
			<li>
				<a href="games.html" class="">
					<span><i class="fa-duotone fa-gamepad-modern"></i></span>
					<span>Games</span>
				</a>
			</li>
		</ul>
		<div id="themeContainer">
			<button class="theme-toggle" id="theme-toggle" title="Toggles light & dark" aria-label="auto">
				<span><i class="fa-duotone fa-circle-half-stroke"></i></span>
				<span>Theme</span>
			</button>
		</div>
	</nav>
	<!-- ===================
	  End Nav - Start Main
	==================== -->
	<main id="container">
		<header>
			<div id="marqueContainer">
				<marquee behavior="" direction="" scrollamount="4">
					<span>=======================================================================================</span>
				</marquee>
			</div>
			<div id="time">
				<span id="clock"></span>
			</div>
		</header>
		<section id="main">
			<div class="container">
				<div id="search">
					<form id="webSearch" name="searchform" onSubmit="return dosearch();">
						<select id="searchEngines" class="form-select form-select-lg" name="sengines">
							<option value="http://www.google.com/search?q=" selected>Google</option>
							<option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
							<option value="https://wikipedia.org/wiki/?search=">Wikipedia</option>
							<option value="https://www.youtube.com/results?search_query=">Youtube</option>
							<option value="https://pubmed.ncbi.nlm.nih.gov/?term=">PubMed</option>
							<option value="https://scholar.google.com/scholar?hl=en&as_sdt=0%252C37&q=">Scholar
							</option>
						</select>
						<input id="searchBar" class="form-control form-control-lg" type="text" name="searchterms"
							placeholder="Where are my pants?">
						<button id="searchBtn" class="btn btn-lg" type="submit"><i
								class="fa-duotone fa-magnifying-glass"></i></button>
					</form>
				</div>
			</div>
		</section>
	</main>
</body>
<script src="scripts/scripts.js"></script>

</html>
