<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ashton Heald | Code Playground</title>
		<link rel="stylesheet" href="assets/fontawesome/css/all.min.css" />
		<link rel="stylesheet" href="styles/css/main.css" />
	</head>

	<body>
		<canvas id="c"></canvas>
		<main id="container">
			<section id="main">
				<div class="title">
					<span class="bold">Welcome To</span>
					<h1>スタートページ</h1>
					<span>(start page)</span>
				</div>
				<div class="container">
					<div id="search">
						<form id="webSearch" name="searchform" onsubmit="return doSearch();">
							<div class="searchbar-container">
								<!-- ------------------------------------ -->
								<div id="searchEngineSelect" tabindex="0">Search Engine</div>
								<select id="searchEngines" class="form-select form-select-lg" name="sengines" style="display: none">
									<option value="https://www.bing.com/search?q=">Bing</option>
									<option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
									<option value="http://www.google.com/search?q=" selected>Google</option>
									<option value="https://you.com/search?q=">You.com</option>
									<option value="https://wikipedia.org/wiki/?search=">Wikipedia</option>
									<option value="https://www.youtube.com/results?search_query=">Youtube</option>
									<option value="https://pubmed.ncbi.nlm.nih.gov/?term=">PubMed</option>
									<option value="https://scholar.google.com/scholar?hl=en&as_sdt=0%252C37&q=">Scholar</option>
								</select>
								<input id="searchBar" class="form-control form-control-lg" type="text" name="searchterms" placeholder="インターネットを閲覧" />
								<button id="clearBtn" type="button" onclick="clearSearch();" hidden><i class="fa-solid fa-xmark"></i></button>
							</div>
							<div class="btn-container">
								<button id="searchBtn" class="btn btn-lg" type="submit">Search <i class="fa-duotone fa-magnifying-glass"></i></button>
								<button id="resetBtn" type="button" onclick="resetSearch();">Reset <i class="fa-duotone fa-rotate-right"></i></button>
							</div>
						</form>
						<!-- ================================================ -->
					</div>
				</div>
			</section>
		</main>
	</body>
	<script src="scripts/modules/navbar.js"></script>
	<script src="scripts/modules/header.js"></script>
	<script src="scripts/main.js"></script>
</html>
