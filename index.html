<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Start Page | Start</title>
	<link rel="stylesheet" href="styles/css/main.css">
</head>

<body>
	<div id="sidebar">
		<div id="logo-details">
			<a href="https://start.ashthe.dev" id="logoName">Start-Page</a>
			<span id="menuBtn"><img src="assets/icons/menu.png" alt="➡️"></span>
		</div>
		<nav>
			<ul id="navList">
				<li>
					<a href="./">
						<span><img src="assets/icons/home.png" alt="🏡"></span>
						<span>Home</span>
					</a>
				</li>
				<li>
					<a href="./pages/news.html">
						<span><img src="assets/icons/news.png" alt="📰"></span>
						<span>News</span>
					</a>
				</li>
				<li>
					<a href="./pages/tools.html">
						<span><img src="assets/icons/tools.png" alt="⚒️"></span>
						<span>Tools</span>
					</a>
				</li>
				<li>
					<a href="./pages/games.html">
						<span><img src="assets/icons/games.png" alt="🎮"></span>
						<span>Games</span>
					</a>
				</li>
			</ul>
		</nav>
		<div id="themeContainer">
			<form id="themeSwitch">
				<div>
					<input checked type="radio" id="auto" name="theme" value="auto">
					<label for="auto">Auto</label>
				</div>
				<div>
					<input type="radio" id="light" name="theme" value="light">
					<label for="light">Light</label>
				</div>
				<div>
					<input type="radio" id="dark" name="theme" value="dark">
					<label for="dark">Dark</label>
				</div>
				<div>
					<input type="radio" id="cyber" name="theme" value="cyber">
					<label for="cyber">Cyber</label>
				</div>
			</form>
		</div>

	</div>
	<div id="container">
		<section id="main">
			<div class="container">
				<div id="search">
					<form id="webSearch" name="searchform" onSubmit="return dosearch();">
						<select id="searchEngines" name="sengines">
							<option value="http://www.google.com/search?q=" selected>Google</option>
							<option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
							<option value="https://wikipedia.org/wiki/?search=">Wikipedia</option>
							<option value="https://www.youtube.com/results?search_query=">Youtube</option>
							<option value="https://pubmed.ncbi.nlm.nih.gov/?term=">PubMed</option>
							<option value="https://scholar.google.com/scholar?hl=en&as_sdt=0%252C37&q=">Scholar</option>
						</select>
						<input id="searchBar" type="text" name="searchterms" placeholder="Where are my pants?">
						<button id="searchBtn" type="submit"><img src="assets/icons/search.png" alt="🔎"></button>
					</form>
				</div>
			</div>
		</section>
		<footer>
			<div>Built by <a href="">Ashton Heald</a></div>
		</footer>
	</div>

</body>
<script src="scripts/scripts.js"></script>

</html>
